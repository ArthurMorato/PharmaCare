# application-service/src/main/resources/application.yml

spring:
  application:
    name: pharmacare-application-service


  data:
    mongodb:
        uri: mongodb://admin:admin@localhost:27017/pharmacare_db?authSource=admin
  
  jackson:
    serialization:
      indent-output: true
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: true
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: America/Sao_Paulo
  
  # Configuração de transação
  transaction:
    default-timeout: 30s
    rollback-on-commit-failure: true
  
# Configurações do MapStruct
mapstruct:
  defaultComponentModel: spring
  unmappedTargetPolicy: IGNORE

# Configurações do caso de uso
pharmacare:
  use-case:
    register-product:
      max-batch-size: 100
      async-timeout-seconds: 30
      validation:
        barcode:
          min-length: 8
          max-length: 14
        name:
          min-length: 3
          max-length: 255
        price:
          min: 0.01
          max: 999999.99
  
  # Eventos
  events:
    domain:
      enabled: true
      async-publishing: true
      retry-attempts: 3
      retry-delay-ms: 1000

      # Logging
logging:
  level:
    com.pharmacare: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
