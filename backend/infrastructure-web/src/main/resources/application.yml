spring:
  data:
    mongodb:
      uri: mongodb://pharmacare_app:app123456@localhost:27017/pharmacare?authSource=pharmacare
      auto-index-creation: true
      
  datasource:
    url: jdbc:postgresql://localhost:5432/pharmacare_transactional
    username: pharmacare
    password: pharmacare123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        
  redis:
    host: localhost
    port: 6379
    password: redis123
    timeout: 2000ms
    
  kafka:
    bootstrap-servers: localhost:9093
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: pharmacare-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        
  elasticsearch:
    uris: http://localhost:9200
    
keycloak:
  auth-server-url: http://localhost:8081
  realm: pharmacare
  resource: pharmacare-backend
  credentials:
    secret: pharmacare-backend-secret-2024
  ssl-required: external
  bearer-only: true